<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Minimal Monochrome — Bento Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     Design tokens — sourced exclusively from design.md
     ("Minimal Monochrome"). No invented values.
     ============================================================ */
  :root {
    /* colors */
    --primary: #000000;
    --on-primary: #ffffff;
    --primary-hover: #1a1a1a;
    --primary-focus: #000000;
    --ink: #000000;
    --ink-muted: #4d4d4d;
    --ink-subtle: #808080;
    --ink-tertiary: #b3b3b3;
    --canvas: #ffffff;
    --surface-1: #ffffff;
    --surface-2: #f7f7f7;
    --surface-3: #f0f0f0;
    --hairline: #ebebeb;
    --hairline-strong: #d4d4d4;

    /* rounded */
    --rounded-md: 8px;
    --rounded-lg: 12px;
    --rounded-pill: 999px;

    /* spacing (8px rhythm, 4px half-step) */
    --sp-xxs: 2px;
    --sp-xs: 4px;
    --sp-sm: 8px;
    --sp-md: 16px;
    --sp-lg: 24px;
    --sp-xl: 40px;
    --sp-xxl: 64px;
    --sp-section: 96px;

    /* layout */
    --container: 1320px;
    --gutter: 24px;

    --font: 'Inter', -apple-system, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--canvas);
    color: var(--ink);
    font-family: var(--font);
    /* typography.body */
    font-size: 16px;
    font-weight: 400;
    line-height: 24px;
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================================
     Typography roles (design.md → typography.*)
     ============================================================ */
  .display-xl { font-size: 48px; font-weight: 600; line-height: 48px; letter-spacing: -2.4px; }
  .display-lg { font-size: 32px; font-weight: 600; line-height: 40px; letter-spacing: -1.28px; }
  .display-md { font-size: 24px; font-weight: 600; line-height: 32px; letter-spacing: -0.6px; }
  .body-sm    { font-size: 14px; font-weight: 400; line-height: 20px; }
  .caption    { font-size: 12px; font-weight: 400; line-height: 16px; }
  .eyebrow {
    font-size: 12px; font-weight: 500; line-height: 16px;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--ink-subtle);
  }

  /* ============================================================
     Layout — single centered column, bento grid
     ============================================================ */
  .section {
    max-width: var(--container);
    margin: 0 auto;
    padding: var(--sp-section) var(--gutter);
  }

  .bento {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    grid-template-rows: auto 1fr;
    gap: var(--gutter);
  }

  /* ============================================================
     Cards — flat, hairline borders, no shadows (design.md)
     ============================================================ */
  .card {
    background: var(--surface-1);
    border: 1px solid var(--hairline);
    border-radius: var(--rounded-lg);
    padding: var(--sp-lg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color 120ms ease;
  }
  .card:hover { border-color: var(--hairline-strong); }

  /* feature-card variant: surface-2 tint (substitutes the
     screenshot's accent-blue fill — no accents in this system) */
  .card--feature { background: var(--surface-2); }

  .card__media {
    border-radius: var(--rounded-md);
    overflow: hidden;
    background: var(--surface-3);
  }
  .card__media img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ---- Left hero card ---- */
  .card--hero { grid-row: 1 / 3; }
  .card--hero .eyebrow {
    text-align: center;
    padding-bottom: var(--sp-md);
  }
  .card--hero .card__media {
    flex: 1;
    min-height: 320px;
  }
  .card--hero .card__body { padding-top: var(--sp-lg); }
  .card--hero .card__tagline {
    color: var(--ink-muted);
    padding-top: var(--sp-md);
  }

  /* ---- Stat card ---- */
  .card--stat .card__media {
    height: 200px;
    margin-bottom: var(--sp-lg);
  }
  .card--stat .stat__label {
    color: var(--ink-muted);
    padding-top: var(--sp-sm);
  }

  /* ---- CTA card ---- */
  .card--cta .card__body { flex: 1; }
  .card--cta .btn { margin-top: var(--sp-xl); align-self: flex-start; }

  /* ============================================================
     Buttons (design.md → components.button-primary)
     ============================================================ */
  .btn {
    /* typography.button */
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    letter-spacing: 0;
    border-radius: var(--rounded-pill);
    padding: 10px 18px;
    min-height: 44px;           /* touch target */
    min-width: 44px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background-color 120ms ease, opacity 120ms ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn--primary {
    background: var(--primary);
    color: var(--on-primary);
  }
  .btn--primary:hover { background: var(--primary-hover); }
  .btn:focus-visible {
    outline: 2px solid var(--primary-focus);
    outline-offset: 2px;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn:disabled:hover { background: var(--primary); }

  /* ============================================================
     Responsive (design.md → three intents)
     ============================================================ */
  @media (max-width: 1024px) {
    .section { padding: var(--sp-xxl) var(--gutter); }
    .display-xl { font-size: 32px; line-height: 40px; letter-spacing: -1.28px; } /* step down to display-lg */
    .display-lg { font-size: 24px; line-height: 32px; letter-spacing: -0.6px; }  /* step down to display-md */
  }
  @media (max-width: 640px) {
    .bento { grid-template-columns: 1fr; grid-template-rows: none; }
    .card--hero { grid-row: auto; }
    .card--hero .card__media { min-height: 240px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<main class="section">
  <div class="bento">

    <!-- Left: hero card -->
    <article class="card card--hero">
      <p class="eyebrow">Member first.</p>
      <div class="card__media">
        <img src="https://placehold.co/1200x600/f5f5f5/737373?text=Hero+image" alt="Hero image" />
      </div>
      <div class="card__body">
        <h1 class="display-lg">Every season starts with a story.</h1>
        <p class="card__tagline caption">For members. For the record.</p>
      </div>
    </article>

    <!-- Top right: stat card -->
    <article class="card card--stat">
      <div class="card__media">
        <img src="https://placehold.co/800x450/ededed/737373?text=Feature+image" alt="Feature image" />
      </div>
      <p class="display-xl">84K+</p>
      <p class="stat__label body-sm">Member updates delivered weekly</p>
    </article>

    <!-- Bottom right: CTA card (feature-card variant) -->
    <article class="card card--feature card--cta">
      <div class="card__body">
        <h2 class="display-md">Turn visits into memberships</h2>
      </div>
      <button class="btn btn--primary" type="button">Explore more</button>
    </article>

  </div>
</main>

</body>
</html>
