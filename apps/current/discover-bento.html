<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — Stadli</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/inter-ui/3.19.3/inter.css">
<style>
  /* ————— Stadli v25 chrome tokens · both canvases are one deliverable ————— */
  :root{
    --primary:#000000; --on-primary:#ffffff; --primary-hover:#1a1a1a;
    --ink:#000000; --ink-muted:#4d4d4d; --ink-subtle:#808080; --ink-tertiary:#b3b3b3;
    --canvas:#ffffff; --surface-1:#ffffff; --surface-2:#f7f7f7; --surface-3:#f0f0f0;
    --hairline:#ebebeb; --hairline-strong:#d4d4d4;

    /* Earned color — extracted from the portrait (amber goggles → anchor ≈ 55°),
       rotations only: −40° analogous → pink · +40° analogous → lime,
       lime stepped darker for the nested pair. Three hues, one family. */
    --anchor:#f4551f;      --on-anchor:#ffffff;
    --rot-pink:#f8b3e6;    --on-rot-pink:#701a4e;
    --rot-lime:#cfe94d;    --on-rot-lime:#1d3a12;
    --rot-lime-deep:#0f5233; --on-rot-lime-deep:#cfe94d;

    --r-md:8px; --r-lg:12px; --r-xl:16px; --r-pill:999px;
    --sp-xxs:2px; --sp-xs:4px; --sp-sm:8px; --sp-md:16px; --sp-lg:32px; --sp-xl:56px; --sp-xxl:96px;

    --ease-standard:cubic-bezier(0.16,1,0.3,1);
    --d-instant:160ms; --d-fast:320ms; --d-slow:1400ms; --d-deliberate:1600ms;
  }
  html.dark{
    --primary:#f5f5f5; --on-primary:#0a0a0a; --primary-hover:#e1e1e1;
    --ink:#f5f5f5; --ink-muted:#cfcfcf; --ink-subtle:#a8a8a8; --ink-tertiary:#828282;
    --canvas:#0a0a0a; --surface-1:#111111; --surface-2:#171717; --surface-3:#1e1e1e;
    --hairline:#262626; --hairline-strong:#404040;

    /* Same hue angles, lightness re-resolved for #0a0a0a — present, not glaring. */
    --anchor:#e8511e;      --on-anchor:#ffffff;
    --rot-pink:#e394cf;    --on-rot-pink:#4a0d33;
    --rot-lime:#bcd743;    --on-rot-lime:#182d0e;
    --rot-lime-deep:#155f3c; --on-rot-lime-deep:#c9e451;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
    background:var(--canvas); color:var(--ink);
    transition:background var(--d-fast) var(--ease-standard), color var(--d-fast) var(--ease-standard);
    -webkit-font-smoothing:antialiased;
  }
  .page{max-width:720px;margin:0 auto;padding:var(--sp-xl) var(--sp-lg) var(--sp-xxl)}

  /* ————— chrome: mode toggle ————— */
  .mode-toggle{
    position:fixed;top:var(--sp-md);right:var(--sp-md);z-index:10;
    font:500 14px/20px 'Inter',sans-serif;color:var(--ink);
    background:var(--canvas);border:1px solid var(--hairline-strong);
    border-radius:var(--r-pill);padding:10px 18px;cursor:pointer;
    transition:background var(--d-fast) var(--ease-standard);
    min-height:44px;
  }
  .mode-toggle:hover{background:var(--surface-2)}
  .mode-toggle:active{transform:scale(0.97)}
  .mode-toggle:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* ————— hero headline — the ink ramp is the hierarchy ————— */
  .stack{padding-top:var(--sp-lg)}
  .stack h1, .stack .ghost{
    font-size:clamp(44px,9vw,64px);font-weight:600;line-height:1.06;letter-spacing:-0.04em;
  }
  .stack h1{color:var(--ink)}
  .stack .ghost{font-weight:500}
  .ghost.g1{color:var(--ink-muted)}
  .ghost.g2{color:var(--ink-subtle)}
  .ghost.g3{color:var(--ink-tertiary)}

  /* ————— the loud moment: raw portrait, left-aligned with the grid,
           whitespace carries the right half — asymmetry is the layout ————— */
  .photo-wrap{position:relative;margin:var(--sp-xxl) 0;width:48%;min-width:280px}
  .photo{
    display:block;width:100%;border-radius:var(--r-xl);
    border:1px solid var(--hairline);
  }
  .photo img{display:block;width:100%;height:auto;border-radius:inherit}
  .tag{
    position:absolute;display:inline-flex;align-items:center;
    font:500 15px/20px 'Inter',sans-serif;color:var(--on-primary);
    background:var(--primary);border:none;
    border-radius:var(--r-pill);padding:10px 18px;white-space:nowrap;
    transition:background var(--d-fast) var(--ease-standard);
    cursor:default;
  }
  .tag:hover{background:var(--primary-hover)}
  .t-asado{top:-21px;left:7%}
  .t-chori{top:18%;right:0;transform:translateX(52%)}
  .t-sushi{top:67%;right:0;transform:translateX(48%)}
  .t-fries{top:76%;left:-16px}
  .t-hamburger{bottom:4%;right:0;transform:translateX(55%)}
  @media(max-width:640px){
    .photo-wrap{width:78%}
    .t-fries{left:-8px}
    .t-chori,.t-sushi{transform:translateX(28%)}
    .t-hamburger{transform:translateX(30%)}
  }

  /* ————— bento — three staggered columns of decreasing width; the columns
           don't share rows: col 3 starts lower, cols 2–3 end lower than col 1 ————— */
  .bento{display:flex;gap:var(--sp-md);align-items:flex-start}
  .b-col{display:flex;flex-direction:column;gap:var(--sp-md);min-width:0}
  .b-col1{flex:1.36}
  .b-col2{flex:1.06}
  .b-col3{flex:0.97;margin-top:112px}
  .cell{
    border-radius:var(--r-lg);padding:var(--sp-lg);
    display:flex;flex-direction:column;
    border:1px solid var(--hairline);
  }
  .cell .eyebrow{font:400 12px/16px 'Inter',sans-serif;letter-spacing:0;margin-bottom:var(--sp-xs);opacity:.78}
  .cell h3{font:600 20px/28px 'Inter',sans-serif;letter-spacing:-0.02em}
  .cell .figure{
    margin-top:auto;align-self:flex-end;
    font-weight:600;letter-spacing:-0.03em;line-height:1;
    font-variant-numeric:tabular-nums;
    padding-top:var(--sp-lg);
  }

  .c-visited{background:var(--primary);color:var(--on-primary);border-color:transparent;min-height:300px}
  .c-visited h3{font-size:clamp(22px,3.2vw,26px);line-height:1.22;white-space:nowrap}
  .c-visited .figure{font-size:clamp(56px,9vw,80px)}

  .c-match{background:var(--anchor);color:var(--on-anchor);border-color:transparent;min-height:150px}
  .c-fav{background:var(--rot-pink);color:var(--on-rot-pink);border-color:transparent;min-height:190px}
  .c-match .figure,.c-fav .figure{font-size:clamp(36px,5.5vw,48px)}

  .c-saved{background:var(--rot-lime-deep);color:var(--on-rot-lime-deep);border-color:transparent;min-height:116px}
  .c-most{background:var(--rot-lime);color:var(--on-rot-lime);border-color:transparent;min-height:122px}
  .c-saved .figure,.c-most .figure{font-size:32px;padding-top:var(--sp-sm)}
  .c-saved h3,.c-most h3{font-size:17px;line-height:24px}

  @media(max-width:640px){
    .bento{flex-wrap:wrap}
    .b-col1{flex:1 1 100%}
    .b-col2{flex:1 1 52%}
    .b-col3{flex:1 1 40%;margin-top:56px}
    .c-visited{min-height:260px}
  }
  @media(max-width:400px){
    .b-col2,.b-col3{flex:1 1 100%}
    .b-col3{margin-top:0}
  }

  /* ————— motion: fade-rise ≤8px + 6px blur; count-up is the one loud moment ————— */
  .reveal{opacity:0;transform:translateY(8px);filter:blur(6px)}
  .reveal.in{
    opacity:1;transform:none;filter:blur(0);
    transition:opacity var(--d-slow) var(--ease-standard),
               transform var(--d-slow) var(--ease-standard),
               filter var(--d-slow) var(--ease-standard);
  }
  @media(prefers-reduced-motion:reduce){
    .reveal{opacity:1;transform:none;filter:none}
    .reveal.in{transition:none}
    .mode-toggle,.tag{transition:none}
  }
</style>
</head>

      <article class="cell c-most reveal">
        <p class="eyebrow">Anchoita</p>
        <h3>Most visited</h3>
        <p class="figure">24</p>
      </article>
    </div>
  </section>

</main>

<script>
(function(){
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* canvas toggle — chrome resolves through paired tokens */
  var root = document.documentElement;
  var btn = document.getElementById('modeToggle');
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) setMode(true);
  btn.addEventListener('click', function(){ setMode(!root.classList.contains('dark')); });
  function setMode(dark){
    root.classList.toggle('dark', dark);
    btn.textContent = dark ? 'Light canvas' : 'Dark canvas';
    btn.setAttribute('aria-pressed', String(dark));
  }

  /* count-up — the viewport's one loud motion, lands exactly on its true value */
  var counted = false;
  function runCount(el){
    if (counted) return; counted = true;
    var target = parseInt(el.dataset.target, 10);
    if (reduced){ el.textContent = target; return; }
    var start = null, D = 1600;
    function frame(t){
      if (!start) start = t;
      var p = Math.min((t - start) / D, 1);
      var e = 1 - Math.pow(1 - p, 3); /* ease-out, arrives and stops */
      el.textContent = Math.round(e * target);
      if (p < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  /* fade-rise — first viewport plays on load; below the fold gates at the 65% line */
  var reveals = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
  if (reduced){
    reveals.forEach(function(el){ el.classList.add('in'); });
    runCount(document.getElementById('countup'));
    return;
  }
  var opening = 220, floor = 110, cap = 6, delay = 0, step = opening, shown = 0;
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if (!entry.isIntersecting) return;
      var el = entry.target;
      io.unobserve(el);
      var d = shown < cap ? delay : 0;
      if (shown < cap){ delay += step; step = Math.max(floor, step - 55); shown++; }
      setTimeout(function(){
        el.classList.add('in');
        if (el.querySelector('#countup')) runCount(document.getElementById('countup'));
      }, d);
    });
  }, { rootMargin: '0px 0px -35% 0px' }); /* activation line ≈ 65% of viewport */
  reveals.forEach(function(el){ io.observe(el); });

  /* blocks too close to the document's end can never cross the activation
     line — when the reader reaches the bottom, they are in reading position */
  function bottomCheck(){
    if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 4){
      reveals.forEach(function(el){
        if (!el.classList.contains('in')){
          el.classList.add('in');
          if (el.querySelector('#countup')) runCount(document.getElementById('countup'));
        }
      });
      window.removeEventListener('scroll', bottomCheck);
    }
  }
  window.addEventListener('scroll', bottomCheck, { passive:true });
  bottomCheck();
})();
</script>
</body>
