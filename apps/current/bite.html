<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bite — Stadli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     STADLI — chrome tokens, resolved on both canvases at once.
     Chrome stays strictly black / white / gray. Two content hues:
     an ORANGE anchor pulled from the food, plus a ROSE sibling by
     rotation — each re-resolved per canvas.
     ============================================================ */
  :root[data-theme="light"] {
    --canvas: #ffffff;
    --surface-2: #f7f7f7;
    --ink: #000000;
    --ink-muted: #4d4d4d;
    --hairline: #ebebeb;
    --hairline-strong: #d4d4d4;
    --anchor-orange: #f1552a;
    --sibling-rose:  #f7c2e4;
    --on-orange: #ffffff;
    --on-rose:  #000000;
  }
  :root[data-theme="dark"] {
    --canvas: #0a0a0a;
    --surface-2: #171717;
    --ink: #f5f5f5;
    --ink-muted: #cfcfcf;
    --hairline: #262626;
    --hairline-strong: #404040;
    --anchor-orange: #ff6a34;
    --sibling-rose:  #f6bfe1;
    --on-orange: #ffffff;
    --on-rose:  #000000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: "Inter", -apple-system, "Segoe UI", sans-serif;
    background: var(--canvas);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background-color .32s cubic-bezier(0.16,1,0.3,1),
                color .32s cubic-bezier(0.16,1,0.3,1);
  }

  /* ---- chrome: theme toggle ---- */
  .theme-toggle {
    position: fixed; top: 24px; right: 24px; z-index: 50;
    display: inline-flex; align-items: center; gap: 8px;
    min-height: 44px; padding: 10px 18px; border-radius: 999px;
    border: 1px solid var(--hairline-strong);
    background: var(--canvas); color: var(--ink);
    font: 500 14px/20px "Inter", sans-serif; cursor: pointer;
    transition: background-color .32s cubic-bezier(0.16,1,0.3,1);
  }
  .theme-toggle:hover { background: var(--surface-2); }
  .theme-toggle:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .theme-toggle .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ink); }

  /* ---- layout: asymmetric, diagonal, pooled whitespace ---- */
  .stage { max-width: 1200px; margin: 0 auto; padding: 132px 64px 144px; }

  .compose {
    position: relative;
    display: grid;
    grid-template-columns: 440px minmax(0, 1fr);
    grid-template-rows: auto auto;
    column-gap: 96px;
  }

  .col-lead  { grid-column: 1; grid-row: 1; }
  .col-trail { grid-column: 2; grid-row: 1 / span 2; padding-top: 236px; }
  .lede      { grid-column: 1; grid-row: 2; }

  /* each card is the positioning context for its own pill */
  .card { position: relative; }
  .card-lead  { max-width: 440px; }
  .card-trail { max-width: 460px; margin-left: auto; }

  /* raw imagery — full strength, hairline defines the edge */
  .frame {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--hairline);
    background: var(--surface-2);
  }
  .frame img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .frame-lead  { aspect-ratio: 5 / 6.4; }
  .frame-trail { aspect-ratio: 5 / 5.8; }

  /* ---- filled pills: earned color, chrome text, trespassing the photo top ---- */
  .pill {
    position: absolute;
    z-index: 3;
    width: 380px;
    max-width: 100%;
    padding: 20px 24px 18px;
    border-radius: 24px;
  }
  .pill h2 { font: 700 40px/44px "Inter", sans-serif; letter-spacing: -1.2px; }
  .pill .meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .pill .author { font: 500 16px/24px "Inter", sans-serif; }
  .pill .time {
    font: 500 14px/20px "Inter", sans-serif;
    padding: 4px 14px; border-radius: 999px; border: 1.5px solid currentColor;
  }
  .pill-rose   { background: var(--sibling-rose);  color: var(--on-rose); }
  .pill-orange { background: var(--anchor-orange); color: var(--on-orange); }

  /* rose overlaps ice-cream top, shifted right + spilling right into whitespace */
  .pill-rose   { top: -58px; left: 44%; }
  /* orange is anchored to the donut's left edge with only a small spill,
     so it stays clear of the ice-cream card at every desktop width */
  .pill-orange { top: -58px; left: -36px; }

  /* ---- the claim: chrome type, leading edge, dropped low-left ---- */
  .lede {
    align-self: start;
    max-width: 360px;
    margin-top: 152px;
    font: 400 26px/36px "Inter", sans-serif;
    letter-spacing: -0.5px;
    color: var(--ink);
  }
  .lede .brand { font-weight: 600; }

  /* ---- motion: cluster = one loud moment, plays on load ---- */
  .rise { opacity: 0; transform: translateY(8px); filter: blur(6px); }
  .play .rise {
    opacity: 1; transform: none; filter: none;
    transition: opacity 1.4s cubic-bezier(0.16,1,0.3,1),
                transform 1.4s cubic-bezier(0.16,1,0.3,1),
                filter 1.4s cubic-bezier(0.16,1,0.3,1);
  }
  .play .d1 { transition-delay: .00s; }
  .play .d2 { transition-delay: .18s; }
  .play .d3 { transition-delay: .34s; }
  .play .d4 { transition-delay: .47s; }

  /* ---- responsive ---- */
  @media (max-width: 900px) {
    .stage { padding: 96px 24px 96px; }
    .compose { grid-template-columns: 1fr; grid-template-rows: auto auto auto; row-gap: 92px; }
    .col-lead  { grid-column: 1; grid-row: 1; }
    .col-trail { grid-column: 1; grid-row: 2; padding-top: 0; }
    .lede      { grid-column: 1; grid-row: 3; margin-top: 8px; max-width: 100%; font-size: 22px; line-height: 32px; }
    .card-lead, .card-trail { max-width: 100%; margin: 0; }
    .pill { width: min(360px, 88%); }
    .pill h2 { font-size: 32px; line-height: 36px; letter-spacing: -0.96px; }
    .pill-rose   { top: -52px; left: auto; right: 4%; }
    .pill-orange { top: -52px; right: auto; left: 4%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .rise { opacity: 1; transform: none; filter: none; }
    .play .rise { transition: none; }
    body, .theme-toggle { transition: none; }
  }
</style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Switch canvas">
    <span class="dot" aria-hidden="true"></span>
    <span id="themeLabel">Dark</span>
  </button>

  <main class="stage">
    <section class="compose" aria-label="Featured picks">

      <!-- leading column: ice cream, high-left -->
      <div class="col-lead">
        <div class="card card-lead">
          <div class="frame frame-lead rise d1">
            <img src="https://i.pinimg.com/1200x/15/20/d0/1520d04416e89b56e669fdef5e4c79df.jpg"
                 referrerpolicy="no-referrer"
                 alt="Scoop of ice cream in a waffle cone with apricot pieces">
          </div>
          <article class="pill pill-rose rise d3">
            <h2>Ice cream</h2>
            <div class="meta">
              <span class="author">Luji</span>
              <span class="time">20 min</span>
            </div>
          </article>
        </div>
      </div>

      <!-- trailing column: donuts, dropped low-right -->
      <div class="col-trail">
        <div class="card card-trail">
          <div class="frame frame-trail rise d2">
            <img src="https://i.pinimg.com/736x/4d/78/8d/4d788d5172d9cb3aeb0de5d7a681ce09.jpg"
                 referrerpolicy="no-referrer"
                 alt="Two glazed doughnuts stacked on a pale plate">
          </div>
          <article class="pill pill-orange rise d4">
            <h2>Donas</h2>
            <div class="meta">
              <span class="author">Dontella</span>
              <span class="time">12 min</span>
            </div>
          </article>
        </div>
      </div>

      <!-- the claim, anchored to the leading edge -->
      <p class="lede rise d4">
        <span class="brand">Bite</span> transforms the journey from
        decision-making to discovering into a seamless and enjoyable process.
      </p>

    </section>
  </main>

<script>
  requestAnimationFrame(function () {
    requestAnimationFrame(function () { document.body.classList.add('play'); });
  });
  var root = document.documentElement;
  var btn = document.getElementById('themeToggle');
  var label = document.getElementById('themeLabel');
  btn.addEventListener('click', function () {
    var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    root.setAttribute('data-theme', next);
    label.textContent = next === 'light' ? 'Dark' : 'Light';
  });
</script>
</body>
</html>
